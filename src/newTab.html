<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <style>
      :root {
        --text-main: #fff;
        --text-muted: rgba(255, 255, 255, 0.7);
        --icon-size: 18px;
        --icon-color: var(--text-main);
      }
      * {
        margin: 0;
        padding: 0;
        text-decoration: none;
        box-sizing: border-box;
        color: var(--text-main);
      }

      i[data-lucide] {
        width: var(--icon-size);
        height: var(--icon-size);
        color: var(--icon-color);
      }

      html {
        color-scheme: dark;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #121212;
      }

      #wallpaperCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        display: block;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0) 20%,
          rgba(0, 0, 0, 0) 70%,
          rgba(0, 0, 0, 0.6) 100%
        );
        z-index: 2;
      }

      .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        z-index: 3;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem;
        opacity: 1;
        box-sizing: border-box;
        transition: opacity 0.5s ease;
      }

      .ui-hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }

      /* body:hover .ui-layer {
        opacity: 1;
      } */

      .top-right {
        position: absolute;
        top: 2rem;
        right: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
      }

      .clock-container {
        text-align: center;
        margin-top: 5vh;
        color: var(--text-main);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      .time {
        font-size: 6rem;
        font-weight: 300;
        margin: 0;
        line-height: 1;
      }

      .time-ampm {
        font-size: 2rem;
        font-weight: 300;
      }

      .date {
        font-size: 1.2rem;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 0.5rem;
      }

      .bottom-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .photo-info {
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      }

      .photo-info span {
        color: var(--text-muted);
      }

      .photo-info strong {
        font-weight: 600;
      }

      .badge {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        z-index: 1;
      }

      .actions {
        display: flex;
        gap: 1rem;
      }

      .icon-btn {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.05);
      }

      .history-indicator {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        z-index: 1;
        display: none;
        white-space: nowrap;
      }

      .history-indicator.visible {
        display: block;
      }

      .info-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.45);
        z-index: 10010;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      .info-overlay.visible {
        opacity: 1;
        visibility: visible;
      }

      .info-card {
        width: min(320px, calc(100% - 48px));
        background: rgba(18, 18, 18, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 18px 18px 14px;
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
      }

      .info-card__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .info-card__title {
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--text-main);
      }

      .info-card__close {
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        display: grid;
        place-items: center;
      }

      .info-card__close:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .info-card__row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.9rem;
      }

      .info-card__row:first-of-type {
        border-top: none;
      }

      .info-card__label {
        color: var(--text-muted);
        font-weight: 500;
      }

      .info-card__value {
        text-align: right;
        max-width: 60%;
        word-break: break-word;
      }

      .info-card__value a {
        color: var(--text-main);
        text-decoration: underline;
      }

      .context-menu {
        position: fixed;
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.92);
        padding: 8px;
        z-index: 10000;
        min-width: 240px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        display: none;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .context-menu.visible {
        display: block;
        animation: contextMenuAppear 0.18s ease;
      }

      @keyframes contextMenuAppear {
        from {
          opacity: 0;
          transform: scale(0.96);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .context-menu ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .context-menu li {
        padding: 12px 14px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.2s, transform 0.2s;
      }

      .context-menu li:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(2px);
      }

      .context-menu li svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .context-menu-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 8px 0;
      }

      .context-menu.visible {
        display: block;
        animation: contextMenuAppear 0.2s ease;
      }

      @keyframes contextMenuAppear {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .context-menu ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .context-menu li {
        padding: 12px 16px;
        cursor: pointer;
        color: #e0e0e0;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        border-radius: 2px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.2s;
      }

      .context-menu li:hover {
        background: #3f3f4681;
        transform: translateX(4px);
      }

      .context-menu li svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .context-menu-divider {
        height: 1px;
        background: #333;
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <canvas id="wallpaperCanvas"></canvas>
    <div class="overlay"></div>

    <div class="ui-layer" id="uiLayer">
      <div class="top-right" id="settingsBtn">Settings</div>

      <div class="clock-container" id="clockContainer">
        <div class="time">
          <span id="timeDisplay">00:00:00</span>
          <span class="time-ampm" id="timeAmPm">PM</span>
        </div>
        <div class="date" id="dateDisplay">Loading...</div>
      </div>

      <div class="bottom-bar">
        <div class="photo-info" id="credit">
          <span>Photo by</span> <strong id="author"></strong>
          <div class="badge" id="source"></div>
        </div>

        <div class="history-indicator" id="historyIndicator">
          <span id="historyPosition">1</span> /
          <span id="historyTotal">15</span>
        </div>

        <div class="actions">
          <button class="icon-btn" title="Back" id="prevImageBtn">
            <i data-lucide="arrow-left" width="20" height="20"></i>
          </button>
          <button
            class="icon-btn"
            title="Refresh"
            id="randomImageBtn"
            title="Get new random image"
          >
            <i data-lucide="shuffle" width="20" height="20"></i>
          </button>
          <button class="icon-btn" title="Info" id="infoBtn">
            <i data-lucide="info" width="20" height="20"></i>
          </button>
          <button class="icon-btn" title="Forward" id="nextImageBtn">
            <i data-lucide="arrow-right" width="20" height="20"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="info-overlay" id="infoOverlay" aria-hidden="true">
      <div class="info-card" role="dialog" aria-label="Image Info">
        <div class="info-card__header">
          <span class="info-card__title">Image Info</span>
          <button class="info-card__close" id="closeInfoBtn" aria-label="Close">×</button>
        </div>
        <div class="info-card__row">
          <span class="info-card__label">Photographer</span>
          <span class="info-card__value" id="infoPhotographer">—</span>
        </div>
        <div class="info-card__row">
          <span class="info-card__label">Source</span>
          <span class="info-card__value" id="infoSource">—</span>
        </div>
        <div class="info-card__row">
          <span class="info-card__label">Resolution</span>
          <span class="info-card__value" id="infoResolution">—</span>
        </div>
      </div>
    </div>

    <div class="context-menu" id="contextMenu">
      <ul>
        <li id="contextDownload">
          <i data-lucide="download" width="18" height="18"></i>
          Download Image
        </li>
        <li id="contextDelete">
          <i data-lucide="trash-2" width="18" height="18"></i>
          Delete Image
        </li>
        <li id="contextHistory">
          <i data-lucide="clock" width="18" height="18"></i>
          View History
        </li>
        <div class="context-menu-divider"></div>
        <li id="contextToggleUI">
          <i data-lucide="eye" width="18" height="18"></i>
          <span id="toggleUIText">Hide UI</span>
        </li>
        <li id="contextRandom">
          <i data-lucide="shuffle" width="18" height="18"></i>
          New Random Image
        </li>
      </ul>
    </div>

    <script type="module" src="newTab.js"></script>
  </body>
</html>
