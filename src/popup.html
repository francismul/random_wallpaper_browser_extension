<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup</title>
    <style>
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      body {
        margin: 0;
        width: 320px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #1a1a1c;
        color: #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
      }

      .thumbnail-container {
        position: relative;
        height: 160px;
        background-color: #27272a;
        background-size: cover;
        background-position: center;
      }
      .thumbnail-container::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      }

      .badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
        color: white;
        z-index: 1;
      }

      .photo-credit {
        position: absolute;
        bottom: 12px;
        left: 12px;
        z-index: 1;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
      }

      .content {
        padding: 16px;
      }

      .quick-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .quick-actions-title {
        font-size: 12px;
        font-weight: 600;
        color: #9ca3af;
        letter-spacing: 0.5px;
      }
      .action-buttons {
        display: flex;
        gap: 12px;
      }

      .icon-btn {
        background: #27272a;
        border: 1px solid #3f3f46;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e5e7eb;
        cursor: pointer;
        transition: background 0.2s;
      }

      .icon-btn:hover {
        background: #3f3f46;
      }

      .icon-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .status-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: #9ca3af;
      }

      .status-item .label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-item .value {
        color: #e5e7eb;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-badge {
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
      }

      .status-badge.online {
        background: #064e3b;
        color: #34d399;
      }

      .status-badge.offline {
        background: #450a0a;
        color: #f87171;
      }

      .progress-bar {
        width: 80px;
        height: 4px;
        background: #3f3f46;
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: #2dd4bf;
        transition: width 0.3s ease;
      }

      .footer-link {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #27272a;
        padding: 12px 16px;
        border-radius: 8px;
        text-decoration: none;
        color: #e5e7eb;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid #3f3f46;
        transition: border-color 0.2s;
        cursor: pointer;
      }

      .footer-link:hover {
        border-color: #52525b;
      }

      .footer-link .left-content {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #2dd4bf;
      }
    </style>
  </head>
  <body>
    <div id="thumbnail" class="thumbnail-container">
      <div id="sourceBadge" class="badge">—</div>
      <div id="photoAuthor" class="photo-credit">Loading...</div>
    </div>

    <div class="content">
      <div class="quick-actions">
        <div class="quick-actions-title">QUICK ACTIONS</div>
        <div class="action-buttons">
          <button id="refreshBtn" class="icon-btn" title="New wallpaper">
            <i data-lucide="refresh-cw" width="16" height="16"></i>
          </button>
          <button id="heartBtn" class="icon-btn" title="Download wallpaper">
            <i data-lucide="download" width="16" height="16"></i>
          </button>
          <button id="settingsBtn" class="icon-btn" title="Settings">
            <i data-lucide="settings" width="16" height="16"></i>
          </button>
        </div>
      </div>

      <div class="status-list">
        <div class="status-item">
          <div class="label">
            <i data-lucide="wifi" width="14" height="14"></i> Status
          </div>
          <div class="value">
            <span id="statusBadge" class="status-badge online">Online</span>
          </div>
        </div>
        <div class="status-item">
          <div class="label">
            <i data-lucide="clock" width="14" height="14"></i> Last fetched
          </div>
          <div class="value" id="lastFetchValue">—</div>
        </div>
        <div class="status-item">
          <div class="label">
            <i data-lucide="database" width="14" height="14"></i> Cache
          </div>
          <div class="value">
            <div class="progress-bar">
              <div id="cacheFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <span id="cacheValue">—</span>
          </div>
        </div>
      </div>

      <button id="openSettingsLink" class="footer-link">
        <div class="left-content">
          <i data-lucide="external-link" width="14" height="14"></i> Open Full
          Settings
        </div>
        <i
          data-lucide="chevron-right"
          width="16"
          height="16"
          color="#9ca3af"
        ></i>
      </button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
